name: Deploy Dial Designer WebApp

on:
  push:
    branches:
      - main
    paths:
      - 'dial-designer/**'
      - '.github/workflows/designer-pages-deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'dial-designer/package-lock.json'

      - name: Install dependencies
        run: |
          cd dial-designer
          npm ci

      - name: Build static site
        run: |
          cd dial-designer
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dial-designer/dist
          branch: gh-pages
          clean: true
