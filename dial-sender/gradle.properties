android.useAndroidX=true

# NOTE: Do not hardcode `org.gradle.java.home` in-repo.
# For local overrides, set it in ~/.gradle/gradle.properties or via JAVA_HOME.

# Workaround for D8/R8 NPE with Java 21 (JVM module restrictions)
org.gradle.jvmargs=-Xmx2g --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
android.enableDexingArtifactTransform=false
